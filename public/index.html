<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>不動産投資分析レポート v11</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',Meiryo,sans-serif;background:#f0f4f8;min-height:100vh}
input,textarea,select,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@media print{
  .no-print{display:none!important}
  body{background:#fff!important}
  main{max-width:100%!important;padding:4mm 6mm!important}
  .print-avoid{page-break-inside:avoid;break-inside:avoid}
  .print-break{page-break-before:always;break-before:page;margin-top:10mm}
  .shadow-card{box-shadow:none!important;border:1px solid #ddd!important}
  @page{size:A4 portrait;margin:10mm 8mm}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;
const MODEL="claude-sonnet-4-20250514";
const S_PROPS="re_props_v10";
const NAVY="#002060",NAVY2="#003a8c",GOLD="#c9a84c",GREEN="#1a7a4a",RED="#c0392b",LIGHT="#f0f4f8";

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const now=()=>new Date().toISOString();
const fmtD=s=>s?new Date(s).toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"}):"−";
const fmt=n=>(n!=null&&n!=="")?Number(n).toLocaleString():"−";
const fmtY=n=>(n!=null&&n!=="")?Number(n).toLocaleString()+"円":"−";
const fmtM=n=>(n!=null&&n!=="")?Math.round(Number(n)/10000).toLocaleString()+"万円":"−";
const fmtP=n=>(n!=null&&n!=="")?Number(n).toFixed(2)+"%":"−";
const getCF=p=>(Number(p.rent)||0)-(Number(p.managementFee)||0)-(Number(p.repairFund)||0)-(Number(p.loanPayment)||0);
const getYld=p=>{if(!p.askingPrice||!p.rent)return null;const net=((Number(p.rent)||0)-(Number(p.managementFee)||0)-(Number(p.repairFund)||0))*12;return net/((Number(p.askingPrice)||1)*10000)*100;};
const toB64=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});
const lsGet=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.error(e);}};

async function callClaude(system,userContent){
  const body={model:MODEL,max_tokens:4096,messages:[{role:"user",content:userContent}]};
  if(system)body.system=system;
  const res=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data=await res.json();
  if(!res.ok)throw new Error(data.error?.message||data.error||`HTTP ${res.status}`);
  return data.content.find(b=>b.type==="text")?.text||"";
}

const SYS_EXTRACT=`あなたは不動産物件情報の専門的なデータ抽出AIです。
与えられたテキスト・画像・PDFから物件情報を正確に抽出してください。
【重要ルール】
- テキストは様々な書式（箇条書き・表形式・自由文・メール・チラシコピー等）で送られます
- 「■項目名\n値」「項目名：値」「項目名　値」など様々な区切り文字に対応してください
- 数値は単位を除いた数字のみ（例：76,500円→76500、1,850万円→1850）
- 不明・記載なしの項目はnullにしてください
- 金額に「万円」とある場合は万円単位のまま数値にしてください
- 「サブリース」「プレミアムライフ」などの文字があれば現況に反映してください
- 余計な説明は不要。JSONのみ返答してください
- 【管理費の重要ルール】管理費と修繕積立金が合計でしか記載されていない場合、managementFeeに合計額を入れ、repairFundは0にし、otherFeeには絶対に管理費を入れないこと
抽出するJSON形式：
{
  "name":"物件名と号室（例：エスリード江坂垂水707号室）",
  "address":"所在地の住所",
  "station":"最寄駅名と徒歩分数（例：江坂駅 徒歩10分）",
  "builtDate":"築年月（例：2014年1月）",
  "builtYear":築年数の数値,
  "structure":"構造（例：RC造、鉄筋コンクリート造）",
  "area":専有面積の数値(㎡),
  "balcony":バルコニー面積の数値(㎡),
  "floor":"何階部分かのテキスト（例：7階部分）",
  "totalUnits":"総戸数のテキスト（例：62戸）",
  "landRight":"土地権利（例：所有権）",
  "laundry":"室内洗濯機置場の有無（有/無）",
  "rent":月額賃料またはサブ賃料の数値(円),
  "managementFee":管理費の数値(円)または合計のみの場合は合計額,
  "repairFund":修繕積立金の数値(円)または合計のみの場合は0,
  "otherFee":管理費・修繕積立金以外のその他費用(円)のみ（管理費合計をここに入れない）,
  "feeNote":"管理費の内訳メモ（例：合計14,200円・内訳不明、管理費5,500円+修繕5,500円）",
  "managementCompany":"管理会社名",
  "currentStatus":"現況（例：サブリース(プレミアムライフ)、賃貸中、空室）",
  "deliveryDate":"引渡日（例：要相談）",
  "askingPrice":希望・目線価格の数値(万円単位),
  "loanBalance":ローン残債の数値(万円単位),
  "sublease":"サブリース会社名や条件の詳細",
  "contractDate":"ローン契約日や購入日",
  "notes":"その他特記事項や備考"
}`;

const SYS_REPORT=`あなたは超一流の日本国内不動産売買スペシャリストです。
物件情報を総合分析し、投資家向け詳細レポートをJSONで生成してください。
エリアの市場動向・築年数・駅距離・CF・ローン状況を踏まえ、具体的かつ実践的な分析を行ってください。
必ずJSONのみ返答してください（説明文・バッククォート不要）。
{
  "marketSummary":"市場動向と物件の立ち位置（300〜400字）",
  "positivePoints":["建物アピールポイント①","②","③","④","⑤"],
  "negativePoints":["懸念点①","②","③"],
  "stationPositive":["駅・エリアのプラス①","②","③"],
  "stationNegative":["駅・エリアのマイナス①","②"],
  "overallJudgment":"総合評価コメント（400〜500字）",
  "holdAdvice":"保有継続の場合の所見（150字）",
  "saleAdvice":"売却検討の場合の所見（150字）",
  "rentTrend":{"p1":第1期賃料,"p2":第2期,"p3":第3期,"p4":第4期,"p5":第5期,"p6":第6期,"note":"根拠"},
  "saleScenario":{"low":保守的(万円),"market":相場(万円),"high":チャレンジ(万円),"note":"根拠"},
  "depreciation":{"amount":年間減価償却費(円),"note":"計算根拠"},
  "propertyTax":{"amount":年間固定資産税(円),"note":"試算根拠"},
  "cfRating":"◎良好 または ○普通 または △要注意",
  "saleRating":"◎今が売り時 または ○どちらでも または △今は保有"
}`;

const DEF={
  id:"",createdAt:"",updatedAt:"",name:"",address:"",station:"",builtDate:"",builtYear:"",
  structure:"RC造",area:"",balcony:"",floor:"",totalUnits:"",landRight:"所有権",laundry:"有",
  rent:"",managementFee:"",repairFund:"",otherFee:0,
  delegationFee:"",fireInsurance:0,
  loanPayment:"",loanBalance:"",loanRate:"",loanRemainingYears:"",
  monthlyInterest:"",monthlyPrincipal:"",contractDate:"",
  propertyTax:60000,depreciation:"",taxRate:30,initialInvestment:"",
  rentPeriods:["","","","","",""],
  repairCostEstimate:1500000,vacancyCostEstimate:"",
  salePrice:"",salePriceHigh:"",salePriceLow:"",
  notaryFee:50000,prepaymentFee:0,cancellationFee:0,
  currentStatus:"",deliveryDate:"要相談",managementCompany:"",
  askingPrice:"",notes:"",sublease:"",feeNote:"",aiReport:null
};

const S={
  card:(ex={})=>({background:"#fff",borderRadius:10,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,.08)",...ex}),
  btn:(bg,ex={})=>({background:bg,color:"#fff",border:"none",padding:"9px 18px",borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:"bold",...ex}),
  inp:(ex={})=>({width:"100%",boxSizing:"border-box",padding:"7px 10px",border:"1px solid #cdd5e0",borderRadius:6,fontSize:13,outline:"none",...ex}),
  lbl:(ex={})=>({fontSize:11,color:"#666",marginBottom:3,display:"block",...ex}),
  badge:(color,ex={})=>({display:"inline-block",padding:"2px 8px",borderRadius:10,fontSize:11,background:color+"22",color:color,fontWeight:"bold",...ex}),
};

function App(){
  const [view,setView]=useState("list");
  const [props,setProps]=useState([]);
  const [selId,setSelId]=useState(null);
  const [form,setForm]=useState({...DEF});
  const [isEdit,setIsEdit]=useState(false);
  const [search,setSearch]=useState("");
  const [sortBy,setSortBy]=useState("date");
  const [fStatus,setFStatus]=useState("all");
  const [fTab,setFTab]=useState("maisoku");
  const [maText,setMaText]=useState("");
  const [upFile,setUpFile]=useState(null);
  const [aiMsg,setAiMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const fileRef=useRef(null);

  useEffect(()=>{const p=lsGet(S_PROPS);if(Array.isArray(p))setProps(p);},[]);
  const persist=useCallback(list=>{setProps(list);lsSet(S_PROPS,list);},[]);
  const selProp=props.find(p=>p.id===selId);

  const filtered=props.filter(p=>{
    const q=search.toLowerCase();
    const ok=!q||[p.name,p.address,p.station,p.currentStatus].some(s=>s?.toLowerCase().includes(q));
    const fs=fStatus==="all"||p.currentStatus===fStatus||(fStatus==="サブリース"&&p.currentStatus?.includes("サブリース"));
    return ok&&fs;
  }).sort((a,b)=>{
    if(sortBy==="date")return new Date(b.updatedAt||0)-new Date(a.updatedAt||0);
    if(sortBy==="name")return(a.name||"").localeCompare(b.name||"");
    if(sortBy==="cf")return getCF(b)-getCF(a);
    if(sortBy==="yield")return(getYld(b)||0)-(getYld(a)||0);
    return 0;
  });

  const doNew=()=>{setForm({...DEF,id:uid(),createdAt:now(),updatedAt:now()});setIsEdit(false);setFTab("maisoku");setMaText("");setUpFile(null);setAiMsg("");setView("form");};
  const doEdit=p=>{setForm({...p});setIsEdit(true);setFTab("basic");setAiMsg("");setView("form");};
  const doView=id=>{setSelId(id);setView("report");};
  const doDelete=id=>{if(!window.confirm("この物件データを削除しますか？"))return;persist(props.filter(p=>p.id!==id));if(selId===id){setSelId(null);setView("list");}};
  const doSave=()=>{const p={...form,updatedAt:now()};const idx=props.findIndex(x=>x.id===p.id);const next=idx>=0?props.map(x=>x.id===p.id?p:x):[p,...props];persist(next);setSelId(p.id);setView("report");};
  const upd=(k,v)=>setForm(prev=>({...prev,[k]:v}));
  const doPrint=()=>window.print();

  const searchByName=async(propName)=>{
    if(!propName||propName.length<4)return;
    setAiMsg("🔍 物件情報をWEB検索中...");setLoading(true);
    try{
      const sys=`あなたは不動産情報調査のエキスパートです。与えられたマンション名から情報を調べ、必ずJSONのみで返答してください。{"address":"住所","station":"最寄駅と徒歩分","builtDate":"築年月","builtYear":築年数,"structure":"構造","totalUnits":"総戸数"}情報が不明な項目はnullにしてください。`;
      const prompt=`マンション「${propName}」の所在地・最寄駅・徒歩・築年月・構造・総戸数を調べてJSONで返してください。`;
      const raw=await callClaude(sys,prompt);
      const jsonMatch=raw.match(/\{[\s\S]*?\}/);
      if(jsonMatch){
        const parsed=JSON.parse(jsonMatch[0]);
        const fields=["address","station","builtDate","builtYear","structure","totalUnits"];
        setForm(prev=>{const u={...prev};fields.forEach(k=>{if(parsed[k]!=null&&parsed[k]!=="")u[k]=parsed[k];});return u;});
        setAiMsg("✅ 物件情報を反映しました！基本情報タブで確認してください");
        setFTab("basic");
      }else{setAiMsg("⚠️ 情報が見つかりませんでした。手動で入力してください");}
    }catch(e){setAiMsg(`⚠️ WEB検索: ${e.message}`);}
    setLoading(false);
  };

  const applyParsed=p=>{
    const fields=["name","address","station","builtDate","builtYear","structure","area","balcony","floor","totalUnits","landRight","laundry","rent","managementFee","repairFund","otherFee","feeNote","managementCompany","currentStatus","deliveryDate","askingPrice","loanBalance","sublease","contractDate","notes"];
    setForm(prev=>{const u={...prev};fields.forEach(k=>{if(p[k]!=null&&p[k]!=="")u[k]=p[k];});return u;});
  };

  const readText=async()=>{
    if(!maText.trim())return;
    setLoading(true);setAiMsg("⏳ テキストを解析中...");
    try{
      const prompt=`以下の不動産物件情報テキストから、物件データをJSONで抽出してください。\n様々な書式（箇条書き・表形式・自由文）に対応し、必要な情報をすべて読み取ってください。\n\n===物件情報テキスト===\n${maText}\n===ここまで===`;
      const raw=await callClaude(SYS_EXTRACT,prompt);
      const cleaned=raw.replace(/```json|```/g,"").replace(/^[^{]*/,"").replace(/[^}]*$/,"").trim();
      const parsed=JSON.parse(cleaned);
      applyParsed(parsed);
      const found=Object.entries(parsed).filter(([k,v])=>v!=null&&v!=="").map(([k])=>k);
      setAiMsg(`✅ 読み取り完了！${found.length}項目を反映しました。「基本情報」タブで確認してください`);
      setFTab("basic");
    }catch(e){setAiMsg(`❌ エラー: ${e.message}\n\nヒント：テキストに物件情報が含まれているか確認してください`);}
    setLoading(false);
  };

  const readFile=async()=>{
    if(!upFile)return;
    setLoading(true);setAiMsg("⏳ ファイルを解析中...");
    try{
      const b64=await toB64(upFile);
      const mt=upFile.type;
      const content=mt==="application/pdf"
        ?[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:"このPDFの販売図面（マイソク）から物件情報をすべて読み取り、JSONで抽出してください。"}]
        :[{type:"image",source:{type:"base64",media_type:mt,data:b64}},{type:"text",text:"この画像の販売図面（マイソク）から物件情報をすべて読み取り、JSONで抽出してください。"}];
      const raw=await callClaude(SYS_EXTRACT,content);
      const jsonMatch=raw.match(/\{[\s\S]*\}/);
      if(!jsonMatch)throw new Error("解析失敗。再度お試しください。");
      const parsed=JSON.parse(jsonMatch[0]);
      applyParsed(parsed);
      const found=Object.entries(parsed).filter(([k,v])=>v!=null&&v!=="").map(([k])=>k);
      setAiMsg(`✅ ${mt.startsWith("image/")?"画像":"PDF"}の読み取り完了！${found.length}項目を反映しました`);
      setFTab("basic");
    }catch(e){setAiMsg(`❌ エラー: ${e.message}`);}
    setLoading(false);
  };

  const genReport=async()=>{
    setLoading(true);setAiMsg("⏳ AIが調査・分析レポートを生成中...\n（30〜60秒かかる場合があります）");
    try{
      const info=JSON.stringify({name:form.name,address:form.address,station:form.station,builtDate:form.builtDate,builtYear:form.builtYear,structure:form.structure,area:form.area,floor:form.floor,totalUnits:form.totalUnits,rent:form.rent,managementFee:form.managementFee,repairFund:form.repairFund,loanPayment:form.loanPayment,loanBalance:form.loanBalance,loanRate:form.loanRate,loanRemainingYears:form.loanRemainingYears,askingPrice:form.askingPrice,currentStatus:form.currentStatus,sublease:form.sublease,monthlyCF:getCF(form)},null,2);
      const raw=await callClaude(SYS_REPORT,`以下の物件情報を分析し、詳細な調査レポートをJSONで生成してください：\n\n${info}`);
      const cleaned=raw.replace(/```json|```/g,"").replace(/^[^{]*/,"").replace(/[^}]*$/,"").trim();
      const r=JSON.parse(cleaned);
      setForm(prev=>({...prev,rentPeriods:[r.rentTrend?.p1||prev.rent,r.rentTrend?.p2,r.rentTrend?.p3,r.rentTrend?.p4,r.rentTrend?.p5,r.rentTrend?.p6],salePrice:r.saleScenario?.market?r.saleScenario.market*10000:prev.salePrice,salePriceHigh:r.saleScenario?.high?r.saleScenario.high*10000:prev.salePriceHigh,salePriceLow:r.saleScenario?.low?r.saleScenario.low*10000:prev.salePriceLow,depreciation:r.depreciation?.amount||prev.depreciation,propertyTax:r.propertyTax?.amount||prev.propertyTax,aiReport:r,updatedAt:now()}));
      setAiMsg("✅ AIレポート生成完了！「保存してレポートを見る」をクリックしてください");
    }catch(e){setAiMsg(`❌ エラー: ${e.message}`);}
    setLoading(false);
  };

  return(
    <div style={{fontFamily:"inherit",minHeight:"100vh",background:LIGHT}}>
      <header className="no-print" style={{background:NAVY,color:"#fff",padding:"0 20px",display:"flex",alignItems:"center",height:52,gap:8,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,32,.3)"}}>
        <div style={{fontSize:17,fontWeight:"bold",cursor:"pointer",marginRight:12,letterSpacing:"-.3px",whiteSpace:"nowrap"}} onClick={()=>setView("list")}>🏢 不動産投資分析<sup style={{fontSize:9,opacity:.6,marginLeft:3}}>v11</sup></div>
        {[{id:"list",label:"📋 一覧",fn:()=>setView("list"),active:view==="list"},{id:"new",label:"＋ 新規登録",fn:doNew,active:view==="form"&&!isEdit}].map(n=>(
          <button key={n.id} onClick={n.fn} style={{background:n.active?"rgba(255,255,255,.2)":"transparent",color:"#fff",border:"none",padding:"5px 13px",borderRadius:6,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
            {n.label}{n.id==="list"&&props.length>0&&<span style={{background:"rgba(255,255,255,.25)",borderRadius:10,padding:"1px 6px",fontSize:11}}>{props.length}</span>}
          </button>
        ))}
      </header>
      <main style={{padding:"20px",maxWidth:1200,margin:"0 auto"}}>
        {view==="list"&&<ListView props={filtered} total={props.length} search={search} setSearch={setSearch} sortBy={sortBy} setSortBy={setSortBy} fStatus={fStatus} setFStatus={setFStatus} onNew={doNew} onView={doView} onEdit={doEdit} onDelete={doDelete}/>}
        {view==="form"&&<FormView data={form} upd={upd} fTab={fTab} setFTab={setFTab} maText={maText} setMaText={setMaText} upFile={upFile} setUpFile={setUpFile} fileRef={fileRef} onReadText={readText} onReadFile={readFile} onGenReport={genReport} onSave={doSave} onCancel={()=>setView("list")} aiMsg={aiMsg} loading={loading} isEdit={isEdit} onSearch={searchByName}/>}
        {view==="report"&&selProp&&<ReportView prop={selProp} onEdit={()=>doEdit(selProp)} onBack={()=>setView("list")} onPrint={doPrint}/>}
      </main>
    </div>
  );
}

function ListView({props,total,search,setSearch,sortBy,setSortBy,fStatus,setFStatus,onNew,onView,onEdit,onDelete}){
  const statuses=[{id:"all",label:`全て(${total})`},{id:"サブリース",label:"サブリース"},{id:"賃貸中",label:"賃貸中"},{id:"空室",label:"空室"}];
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",marginBottom:16,gap:12,flexWrap:"wrap"}}>
        <h2 style={{margin:0,fontSize:20,color:NAVY,fontWeight:"bold"}}>物件一覧</h2>
        <button onClick={onNew} style={S.btn(NAVY,{fontSize:13,padding:"7px 16px"})}>＋ 新規物件を登録</button>
        <div style={{marginLeft:"auto",fontSize:13,color:"#666"}}>{props.length}件表示 / 計{total}件</div>
      </div>
      <div style={{...S.card(),marginBottom:14,padding:14,display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
        <div style={{position:"relative",flex:"1 1 240px"}}>
          <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"#aaa"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="物件名・住所・駅名で検索..." style={{...S.inp(),paddingLeft:32}}/>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"#666",alignSelf:"center"}}>現況：</span>
          {statuses.map(s=>(<button key={s.id} onClick={()=>setFStatus(s.id)} style={{background:fStatus===s.id?NAVY:"transparent",color:fStatus===s.id?"#fff":"#555",border:`1px solid ${fStatus===s.id?NAVY:"#cdd5e0"}`,padding:"4px 10px",borderRadius:5,cursor:"pointer",fontSize:12,whiteSpace:"nowrap"}}>{s.label}</button>))}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:12,color:"#666"}}>並替：</span>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{...S.inp(),width:"auto",padding:"4px 8px",fontSize:12}}>
            <option value="date">更新日時</option><option value="name">物件名</option><option value="cf">CF順</option><option value="yield">利回り順</option>
          </select>
        </div>
      </div>
      {props.length===0&&(
        <div style={{textAlign:"center",padding:"80px 20px",color:"#888"}}>
          <div style={{fontSize:48,marginBottom:16}}>🏢</div>
          <div style={{fontSize:18,fontWeight:"bold",marginBottom:8,color:"#555"}}>{total===0?"物件データがありません":"検索結果がありません"}</div>
          <div style={{fontSize:13,marginBottom:24}}>{total===0?"「新規物件を登録」から最初の物件を追加しましょう":"検索条件を変更してください"}</div>
          {total===0&&<button onClick={onNew} style={S.btn(NAVY)}>＋ 新規物件を登録</button>}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:16}}>
        {props.map(p=><PropCard key={p.id} p={p} onView={onView} onEdit={onEdit} onDelete={onDelete}/>)}
      </div>
    </div>
  );
}

function PropCard({p,onView,onEdit,onDelete}){
  const cf=getCF(p);const yl=getYld(p);
  const [hover,setHover]=useState(false);
  return(
    <div style={{...S.card(),position:"relative",boxShadow:hover?"0 4px 16px rgba(0,32,96,.13)":"0 1px 4px rgba(0,0,0,.08)",transition:"box-shadow .2s",cursor:"pointer"}} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={()=>onView(p.id)}>
      <div style={{position:"absolute",top:12,right:12}}><span style={S.badge(p.currentStatus?.includes("サブリース")?GOLD:p.currentStatus==="空室"?RED:GREEN,{fontSize:10,whiteSpace:"nowrap"})}>{p.currentStatus||"未設定"}</span></div>
      <div style={{fontWeight:"bold",fontSize:15,color:NAVY,marginBottom:4,paddingRight:90,lineHeight:1.3}}>{p.name||"（物件名未設定）"}</div>
      <div style={{fontSize:12,color:"#666",marginBottom:10}}>{p.station||p.address||"所在地未設定"}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:8}}>
        {[{l:"月間CF",v:`${cf>=0?"+":""}${fmt(cf)}円`,c:cf>=0?GREEN:RED},{l:"表面利回り",v:yl?yl.toFixed(1)+"%":"−",c:yl&&yl>=5?GREEN:yl?"#e07b00":RED},{l:"ローン残債",v:p.loanBalance?(Number(p.loanBalance)*10000).toLocaleString()+"円":"−",c:"#555"}].map(m=>(
          <div key={m.l} style={{background:"#f8fafc",borderRadius:6,padding:"6px 8px",textAlign:"center"}}><div style={{fontSize:10,color:"#888",marginBottom:2}}>{m.l}</div><div style={{fontSize:13,fontWeight:"bold",color:m.c}}>{m.v}</div></div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10}}>
        {[{l:"賃料",v:fmtY(p.rent)},{l:"管理費+修繕",v:fmtY((Number(p.managementFee)||0)+(Number(p.repairFund)||0)||null)}].map(m=>(
          <div key={m.l} style={{background:"#f8fafc",borderRadius:6,padding:"5px 8px",textAlign:"center"}}><div style={{fontSize:10,color:"#888",marginBottom:1}}>{m.l}</div><div style={{fontSize:12,fontWeight:"bold",color:"#333"}}>{m.v}</div></div>
        ))}
      </div>
      <div style={{fontSize:11,color:"#aaa",marginBottom:10}}>{p.builtDate||"築年月不明"} | {p.area||"−"}㎡ | {p.floor||"−"} | 更新：{fmtD(p.updatedAt)}</div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={e=>{e.stopPropagation();onView(p.id);}} style={S.btn(NAVY,{flex:1,padding:"6px 10px",fontSize:12})}>📊 レポートを見る</button>
        <button onClick={e=>{e.stopPropagation();onEdit(p);}} style={S.btn(NAVY2,{padding:"6px 10px",fontSize:12})}>✏️</button>
        <button onClick={e=>{e.stopPropagation();onDelete(p.id);}} style={{background:"#fee",border:"1px solid #fcc",color:RED,padding:"6px 10px",borderRadius:7,cursor:"pointer",fontSize:12}}>🗑</button>
      </div>
      {p.aiReport&&<div style={{position:"absolute",bottom:12,right:12,fontSize:10,color:GREEN}}>🤖 AI分析済</div>}
    </div>
  );
}

function FormView({data,upd,fTab,setFTab,maText,setMaText,upFile,setUpFile,fileRef,onReadText,onReadFile,onGenReport,onSave,onCancel,aiMsg,loading,isEdit,onSearch}){
  const tabs=[{id:"maisoku",label:"📄 マイソク読み取り"},{id:"basic",label:"🏢 基本情報"},{id:"financial",label:"💰 財務情報"},{id:"sale",label:"🏷️ 売却設定"},{id:"ai",label:"🤖 AIレポート生成"}];

        <h2 style={{margin:0,fontSize:17,color:NAVY,fontWeight:"bold"}}>{isEdit?`編集：${data.name||"（物件名未設定）"}`:"新規物件登録"}</h2>
        {loading&&<span style={{fontSize:12,color:GOLD}}><span className="spinner"/>処理中...</span>}
      </div>
      {(data.rent||data.loanPayment)&&(
        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <div style={{background:"#fff",border:`1px solid ${cf>=0?GREEN:RED}30`,borderRadius:6,padding:"5px 12px",display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#666"}}>月間CF</span>
            <span style={{fontSize:14,fontWeight:"bold",color:cf>=0?GREEN:RED}}>{cf>=0?"+":""}{fmtY(cf)}</span>
          </div>
          {yl&&<div style={{background:"#fff",border:"1px solid #e07b0030",borderRadius:6,padding:"5px 12px",display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:11,color:"#666"}}>表面利回り</span><span style={{fontSize:14,fontWeight:"bold",color:"#e07b00"}}>{fmtP(yl)}</span></div>}
        </div>
      )}
      <div style={{display:"flex",gap:0,borderBottom:"2px solid #e2e8f0",flexWrap:"wrap"}}>
        {tabs.map(t=>(<button key={t.id} onClick={()=>setFTab(t.id)} style={{background:"transparent",border:"none",padding:"10px 14px",cursor:"pointer",fontSize:12,color:fTab===t.id?NAVY:"#666",fontWeight:fTab===t.id?"bold":"normal",borderBottom:fTab===t.id?`3px solid ${NAVY}`:"3px solid transparent",marginBottom:-2,whiteSpace:"nowrap"}}>{t.label}</button>))}
      </div>
      <div style={{...S.card(),borderTopLeftRadius:0,borderTopRightRadius:0,padding:22}}>
        {fTab==="maisoku"&&<TabMaisoku maText={maText} setMaText={setMaText} upFile={upFile} setUpFile={setUpFile} fileRef={fileRef} onReadText={onReadText} onReadFile={onReadFile} aiMsg={aiMsg} loading={loading} onNext={()=>setFTab("basic")}/>}
        {fTab==="basic"&&<TabBasic data={data} upd={upd} onSearch={onSearch} loading={loading}/>}
        {fTab==="financial"&&<TabFinancial data={data} upd={upd} cf={cf} yl={yl}/>}
        {fTab==="sale"&&<TabSale data={data} upd={upd}/>}
        {fTab==="ai"&&<TabAI data={data} onGenReport={onGenReport} aiMsg={aiMsg} loading={loading}/>}
      </div>
      <div style={{display:"flex",gap:10,marginTop:14,alignItems:"center",flexWrap:"wrap"}}>
        <button onClick={onSave} style={S.btn(GREEN,{padding:"10px 24px",fontSize:14})}>💾 保存してレポートを見る</button>
        <button onClick={onCancel} style={{background:"transparent",border:"1px solid #cdd5e0",padding:"10px 18px",borderRadius:7,cursor:"pointer",fontSize:13}}>キャンセル</button>
        {loading&&<span style={{fontSize:12,color:"#888"}}>処理中...</span>}
      </div>
    </div>
  );
}

function TabMaisoku({maText,setMaText,upFile,setUpFile,fileRef,onReadText,onReadFile,aiMsg,loading,onNext}){
  return(
    <div>
      <div style={{background:"#f0f8ff",border:"1px solid #c5d8f0",borderRadius:8,padding:12,marginBottom:16,fontSize:12,color:"#444",lineHeight:1.8}}>

        ・箇条書き（■項目\n値 形式）<br/>・表形式のテキスト<br/>・メール・チラシのコピペ<br/>・画像（JPG/PNG）・PDF（マイソク）<br/>・複数の物件情報が混在していても自動で精査します
      </div>
      <div style={{border:"1px solid #e2e8f0",borderRadius:8,padding:16,marginBottom:14}}>

        <textarea value={maText} onChange={e=>setMaText(e.target.value)} placeholder={"例：\n■物件名\nエスリード江坂垂水707号室\n■賃料\n77,460円\n■管理費・修繕積立金\n5,500円 / 5,500円\n\nまたはメール・チラシのテキストをそのまま貼り付けてください"} style={{...S.inp(),height:160,resize:"vertical",fontSize:12}}/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={onReadText} disabled={loading||!maText.trim()} style={S.btn(NAVY,{fontSize:12,opacity:loading||!maText.trim()?0.6:1})}>
            {loading&&<span className="spinner"/>}🤖 AI解析 → フォームに反映
          </button>
          <button onClick={()=>setMaText("")} style={S.btn("#888",{fontSize:12,padding:"8px 14px"})}>🗑 クリア</button>
        </div>
      </div>
      <div style={{border:"1px solid #e2e8f0",borderRadius:8,padding:16,marginBottom:14}}>

          style={{border:`2px dashed ${upFile?NAVY:"#cdd5e0"}`,borderRadius:7,padding:"24px 20px",textAlign:"center",cursor:"pointer",background:upFile?"#f0f4ff":"#fafafa",marginBottom:8}}>
          <div style={{fontSize:24,marginBottom:6}}>{upFile?"📄":"📂"}</div>
          {upFile?(<div><div style={{fontWeight:"bold",color:NAVY}}>{upFile.name}</div><div style={{fontSize:12,color:"#888"}}>{(upFile.size/1024).toFixed(0)} KB</div></div>):(<div style={{color:"#888",fontSize:13}}>ドラッグ&ドロップ またはクリックして選択<br/><span style={{fontSize:11,color:"#bbb"}}>JPG / PNG / PDF 対応</span></div>)}
        </div>
        <input ref={fileRef} type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={e=>setUpFile(e.target.files[0])}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onReadFile} disabled={loading||!upFile} style={S.btn(NAVY,{fontSize:12,opacity:loading||!upFile?0.6:1})}>
            {loading&&<span className="spinner"/>}🤖 ファイル解析 → フォームに反映

          <button onClick={()=>setUpFile(null)} style={S.btn("#888",{fontSize:12,padding:"8px 14px"})}>🗑 クリア</button>
        </div>
      </div>
      {aiMsg&&(<div style={{padding:"10px 14px",background:aiMsg.startsWith("✅")?"#f0fff4":aiMsg.startsWith("❌")?"#fff0f0":"#fffbf0",borderLeft:`3px solid ${aiMsg.startsWith("✅")?GREEN:aiMsg.startsWith("❌")?RED:GOLD}`,borderRadius:4,fontSize:13,marginBottom:14,whiteSpace:"pre-wrap"}}>{aiMsg}</div>)}
      <button onClick={onNext} style={S.btn(NAVY2,{fontSize:13})}>次へ：基本情報を確認 →</button>
    </div>
  );
}

function FRow({label:lbl,value,onChange,type="text",placeholder}){
  return(<div><label style={S.lbl()}>{lbl}</label><input type={type} value={value??""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={S.inp()}/></div>);
}

  const spL=data.salePriceLow?Math.round(Number(data.salePriceLow)/10000):"";
  const scenarios=[{label:"相場価格",price:Number(data.salePrice)||0,color:NAVY2},{label:"チャレンジ",price:Number(data.salePriceHigh)||0,color:GOLD}].filter(s=>s.price>0);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
        <FRow label="相場売却価格（万円）" value={spM} onChange={v=>upd("salePrice",v*10000)} type="number" placeholder="例：1850"/>
        <FRow label="チャレンジ価格（万円）" value={spH} onChange={v=>upd("salePriceHigh",v*10000)} type="number" placeholder="例：2000"/>
        <FRow label="保守的価格（万円）" value={spL} onChange={v=>upd("salePriceLow",v*10000)} type="number" placeholder="例：1650"/>
        <FRow label="司法書士・印紙代（円）" value={data.notaryFee} onChange={v=>upd("notaryFee",v)} type="number" placeholder="50000"/>
        <FRow label="一括返済手数料（円）" value={data.prepaymentFee} onChange={v=>upd("prepaymentFee",v)} type="number" placeholder="0"/>
        <FRow label="賃管解除費用（円）" value={data.cancellationFee} onChange={v=>upd("cancellationFee",v)} type="number" placeholder="0"/>
      </div>
      {scenarios.map((s,i)=>{
        const c=(s.price*0.03+60000)*1.1;const res=(Number(data.loanBalance)||0)*10000;
        const net=s.price-c-(Number(data.notaryFee)||0)-(Number(data.prepaymentFee)||0)-res;
        return(<div key={i} style={{padding:"10px 14px",background:"#f8fafc",borderRadius:7,marginBottom:8,borderLeft:`3px solid ${s.color}`}}>
          <div style={{fontSize:12,fontWeight:"bold",color:s.color,marginBottom:4}}>{s.label}</div>
          <div style={{display:"flex",gap:16,fontSize:12,flexWrap:"wrap"}}><span>売却：{fmtM(s.price)}</span><span>仲介：▲{fmtM(c)}</span><span>残債：▲{fmtM(res)}</span><strong style={{color:net>=0?GREEN:RED}}>手残：{net>=0?"+":""}{fmtM(net)}</strong></div>
        </div>);
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   【新機能】収支シミュレーション（PDF 3P相当）
   ═══════════════════════════════════════════════ */
function SimSection({p}){
  const mgmtBase=(Number(p.managementFee)||0)+(Number(p.repairFund)||0);
  const delegBase=Number(p.delegationFee)||0;
  const loanPay=Number(p.loanPayment)||0;
  const loanYears=Number(p.loanRemainingYears)||15;
  const loanMonthsTotal=Math.round(loanYears*12);
  const INC=3000; // 5年ごとの費用増加想定（建物老朽化）

  // 残債完済期間を5年刻みで動的生成（端数あり）
  const periods=[];
  let elapsed=0;
  let pi=0;
  while(elapsed<loanMonthsTotal){
    const remaining=loanMonthsTotal-elapsed;
    const months=Math.min(60,remaining);
    const startYr=elapsed/12;
    const label=elapsed===0?"現在":`${Number.isInteger(startYr)?startYr.toFixed(0):startYr.toFixed(1)}年経過`;
    const rent=Number(p.rentPeriods[pi])||Number(p.rent)||0;
    const mgmt=mgmtBase+pi*INC;
    const deleg=delegBase+pi*INC;
    const monthlyCF=rent-deleg-mgmt-loanPay;
    const periodCF=monthlyCF*months;
    periods.push({label,rent,mgmt,deleg,monthlyLoan:loanPay,monthlyCF,months,periodCF});
    elapsed+=months;
    pi++;
  }

  const totalCF=periods.reduce((s,r)=>s+r.periodCF,0);
  const isSublease=p.currentStatus?.includes("サブリース");
  const repairCost=Number(p.repairCostEstimate)||1500000;
  const vacancyCost=isSublease?0:(Number(p.vacancyCostEstimate)||1062000);
  const grandTotal=totalCF-repairCost-vacancyCost;

  // 残債完済後の月間収支（ローン返済消滅）
  const postMonthly=(Number(p.rent)||0)-mgmtBase-delegBase;
  const postAnnual=postMonthly*12;

  // プラスマイナスゼロまでの回収期間
  const recoveryMonths=grandTotal<0&&postMonthly>0?Math.ceil(-grandTotal/postMonthly):null;
  const recoveryYears=recoveryMonths?(recoveryMonths/12).toFixed(1):null;
  const totalToBreakEven=recoveryMonths?(loanYears+recoveryMonths/12).toFixed(1):null;

  // 完済後→プラマイ0までの列を追加（displayPeriodsとして管理）
  const displayPeriods=[...periods];
  if(recoveryMonths&&postMonthly>0&&grandTotal<0){
    const piPost=periods.length;
    const postRent=Number(p.rentPeriods[piPost])||Number(p.rent)||0;
    const postMgmtVal=mgmtBase+piPost*INC;
    const postDelegVal=delegBase+piPost*INC;
    const postCFVal=postRent-postDelegVal-postMgmtVal;
    displayPeriods.push({
      label:`完済後\n結4${recoveryYears}年`,
      rent:postRent,mgmt:postMgmtVal,deleg:postDelegVal,
      monthlyLoan:0,monthlyCF:postCFVal,
      months:recoveryMonths,periodCF:postCFVal*recoveryMonths,
      isPost:true
    });
  }

  const N=displayPeriods.length;
  const grid={display:"grid",gridTemplateColumns:`100px repeat(${N},1fr)`};
  const hdCell=(v,isPost=false)=><div style={{padding:"6px 4px",fontSize:11,color:"#fff",fontWeight:"bold",textAlign:"center",borderRight:"1px solid rgba(255,255,255,.2)",background:isPost?GREEN:"transparent",whiteSpace:"pre-line",lineHeight:1.3}}>{v}</div>;
  const tdCell=(v,c,bold=false,isPost=false)=><div style={{padding:"5px 6px",fontSize:11,textAlign:"right",color:c||"#333",fontWeight:bold?"bold":"normal",borderRight:"1px solid #f0f0f0",borderBottom:"1px solid #f5f5f5",background:isPost?"#f0fff4":"transparent"}}>{v}</div>;
  const lbCell=(v)=><div style={{padding:"5px 8px",fontSize:11,color:"#555",borderRight:"1px solid #e8e8e8",borderBottom:"1px solid #f5f5f5",background:"#fafafa"}}>{v}</div>;

  return(
    <div style={{...S.card(),marginBottom:14}} className="print-avoid shadow-card">
      <div style={{fontWeight:"bold",fontSize:14,color:NAVY,marginBottom:2}}>📊 残債完済まで不動産を所有された際の簡易収支シミュレーション</div>
      <div style={{fontSize:11,color:"#888",marginBottom:12}}>※ローンの返済期間を約{loanYears}年と想定した場合　単位：別途記載の無いものは「円」</div>

      {/* 期間別収支表（列数は残年数から自動生成） */}
      <div style={{overflowX:"auto"}}>
        <div style={{minWidth:Math.max(480,100+N*100)}}>
          <div style={{...grid,background:NAVY,borderRadius:"6px 6px 0 0"}}>
            {hdCell("＜内訳＞")}
            {displayPeriods.map((r,i)=>hdCell(r.label,!!r.isPost))}
          </div>
          {[
            {label:"賃料",vals:displayPeriods.map(r=>Number(r.rent).toLocaleString()),colors:displayPeriods.map(()=>"#333")},
            {label:"業務委託手数料",vals:displayPeriods.map(r=>r.deleg>0?`▲${r.deleg.toLocaleString()}`:"−"),colors:displayPeriods.map(()=>RED)},
            {label:"管理費・修繕積立金",vals:displayPeriods.map(r=>r.mgmt>0?`▲${r.mgmt.toLocaleString()}`:"−"),colors:displayPeriods.map(()=>RED)},
            {label:"月のご返済",vals:displayPeriods.map(r=>r.monthlyLoan>0?`▲${r.monthlyLoan.toLocaleString()}`:"−"),colors:displayPeriods.map(r=>r.monthlyLoan>0?RED:"#888")},
          ].map((row,ri)=>(
            <div key={ri} style={grid}>
              {lbCell(row.label)}
              {row.vals.map((v,i)=>tdCell(v,row.colors[i],false,!!displayPeriods[i].isPost))}
            </div>
          ))}
          <div style={{...grid,background:"#fff8e1"}}>
            <div style={{padding:"5px 8px",fontSize:11,fontWeight:"bold",color:NAVY,borderRight:"1px solid #e8e8e8",borderBottom:"1px solid #ffe082"}}>月の収支</div>
            {displayPeriods.map((r,i)=>(<div key={i} style={{padding:"5px 6px",fontSize:12,textAlign:"right",fontWeight:"bold",color:r.monthlyCF>=0?GREEN:RED,borderRight:"1px solid #ffe082",borderBottom:"1px solid #ffe082",background:r.isPost?"#f0fff4":"transparent"}}>{r.monthlyCF>=0?"+":""}{r.monthlyCF.toLocaleString()}</div>))}
          </div>
          <div style={grid}>
            {lbCell("月数（回）")}
            {displayPeriods.map((r,i)=>tdCell(`${r.months}回`,"#666",false,!!r.isPost))}
          </div>
          <div style={{...grid,background:"#e8f0ff"}}>
            <div style={{padding:"6px 8px",fontSize:11,fontWeight:"bold",color:NAVY,borderRight:"1px solid #c5d0e8"}}>期間収支</div>
            {displayPeriods.map((r,i)=>(<div key={i} style={{padding:"6px 6px",fontSize:12,textAlign:"right",fontWeight:"bold",color:r.periodCF>=0?GREEN:RED,borderRight:"1px solid #c5d0e8",background:r.isPost?"#f0fff4":"transparent"}}>{r.periodCF>=0?"+":""}{r.periodCF.toLocaleString()}</div>))}
          </div>
        </div>
      </div>

      {/* タイムライン：残債完済 → プラスマイナスゼロ */}
      {postMonthly!==0&&(
        <div style={{marginTop:14,padding:12,background:"#f0f4ff",borderRadius:8,border:`1px solid ${NAVY2}33`}}>
          <div style={{fontWeight:"bold",fontSize:12,color:NAVY2,marginBottom:10}}>📅 残債完済後 → プラスマイナスゼロまでのタイムライン</div>
          <div style={{display:"flex",alignItems:"stretch",gap:0,overflowX:"auto"}}>
            <div style={{textAlign:"center",padding:"8px 12px",background:NAVY,color:"#fff",borderRadius:"6px 0 0 6px",fontSize:11,whiteSpace:"nowrap",flexShrink:0}}>
              <div style={{fontWeight:"bold"}}>現在</div>
              <div style={{fontSize:10,opacity:.8}}>0年</div>
            </div>
            <div style={{display:"flex",alignItems:"center",flex:"2 1 60px",minWidth:30}}>
              <div style={{width:"100%",height:4,background:`linear-gradient(to right,${NAVY},${RED})`}}/>
            </div>
            <div style={{textAlign:"center",padding:"8px 14px",background:RED+"ee",color:"#fff",fontSize:11,whiteSpace:"nowrap",flexShrink:0}}>
              <div style={{fontWeight:"bold"}}>残債完済</div>
              <div style={{fontSize:12,fontWeight:"bold"}}>約{loanYears}年後</div>
              <div style={{fontSize:10,opacity:.85}}>ローン返済終了</div>
            </div>
            {recoveryMonths&&postMonthly>0&&(<>
              <div style={{display:"flex",alignItems:"center",flex:"1 1 40px",minWidth:20}}>
                <div style={{width:"100%",height:4,background:`linear-gradient(to right,${RED},${GOLD})`}}/>
              </div>
              <div style={{textAlign:"center",padding:"8px 14px",background:GOLD+"ee",color:"#fff",fontSize:11,whiteSpace:"nowrap",flexShrink:0}}>
                <div style={{fontWeight:"bold"}}>プラスマイナス０</div>
                <div style={{fontSize:12,fontWeight:"bold"}}>約{totalToBreakEven}年後</div>
                <div style={{fontSize:10,opacity:.85}}>完済後+{recoveryYears}年</div>
              </div>
              <div style={{display:"flex",alignItems:"center",flex:"1 1 40px",minWidth:20}}>
                <div style={{width:"100%",height:4,background:`linear-gradient(to right,${GOLD},${GREEN})`}}/>
              </div>
              <div style={{textAlign:"center",padding:"8px 12px",background:GREEN,color:"#fff",borderRadius:"0 6px 6px 0",fontSize:11,whiteSpace:"nowrap",flexShrink:0}}>
                <div style={{fontWeight:"bold"}}>純プラス</div>
                <div style={{fontSize:10}}>収支開始</div>
              </div>
            </>)}
            {grandTotal>=0&&(
              <>
                <div style={{display:"flex",alignItems:"center",flex:"1 1 40px",minWidth:20}}>
                  <div style={{width:"100%",height:4,background:`linear-gradient(to right,${RED},${GREEN})`}}/>
                </div>
                <div style={{textAlign:"center",padding:"8px 12px",background:GREEN,color:"#fff",borderRadius:"0 6px 6px 0",fontSize:11,whiteSpace:"nowrap",flexShrink:0}}>
                  <div style={{fontWeight:"bold"}}>純プラス収支</div>
                  <div style={{fontSize:10}}>完済と同時</div>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* 結果サマリー ①〜⑥ */}
      <div style={{marginTop:16,paddingTop:14,borderTop:"2px solid #e2e8f0"}}>
        <div style={{fontWeight:"bold",fontSize:13,color:NAVY,marginBottom:10}}>
          ＜結果＞調査結果と現状の実数値を基にした「残債完済まで不動産を所有された際の収支シミュレーション結果」
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <tbody>
            <tr style={{borderBottom:"1px solid #f0f0f0"}}>
              <td style={{padding:"8px 10px",fontSize:12,color:"#555",width:"65%"}}>①期間収支の合計額　<span style={{fontSize:10,color:"#aaa"}}>(ローン完済までの約{loanYears}年間合計)</span></td>
              <td style={{padding:"8px 10px",fontSize:13,fontWeight:"bold",textAlign:"right",color:totalCF>=0?GREEN:RED}}>{totalCF>=0?"+":""}{totalCF.toLocaleString()}円</td>
            </tr>
            <tr style={{borderBottom:"1px solid #f0f0f0"}}>
              <td style={{padding:"8px 10px",fontSize:12,color:"#555"}}>②想定される室内の修繕諸費用　<span style={{fontSize:10,color:"#aaa"}}>※参考資料の簡易試算を参照</span></td>

              <td style={{padding:"10px",textAlign:"right"}}>
                <span style={{fontSize:17,fontWeight:"bold",color:grandTotal>=0?GREEN:RED,background:grandTotal<0?"#ffebee":"#e8f5e9",padding:"4px 12px",borderRadius:6,border:`2px solid ${grandTotal<0?RED:GREEN}`}}>
                  {grandTotal>=0?"+":""}{grandTotal.toLocaleString()}円
                </span>

            </tr>
            <tr style={{borderBottom:"1px solid #f0f0f0"}}>
              <td style={{padding:"8px 10px",fontSize:12,color:"#555"}}>⑤残債完済後の収支（ローン返済なし）</td>

        {grandTotal<0&&totalToBreakEven&&(

            <span style={{fontWeight:"normal",color:"#888",marginLeft:8}}>(残債完済 約{loanYears}年 ＋ 回収期間 約{recoveryYears}年)</span>

        {grandTotal>=0&&(
          <div style={{marginTop:10,padding:"10px 14px",background:"#f0fff4",borderRadius:6,fontSize:12,color:GREEN,fontWeight:"bold",border:`1px solid ${GREEN}44`}}>

          </div>
        )}
        <div style={{fontSize:11,color:"#999",marginTop:8,lineHeight:1.6}}>
          ※管理費・修繕積立金および業務委託費用は5年ごとに3,000円増加と想定しております。<br/>

/* ═══════════════════════════════════════════════
   【新機能】節税・CF詳細セクション（PDF 4P相当）
   ═══════════════════════════════════════════════ */
function TaxCFSection({p}){
  const rent=Number(p.rent)||0;
  const mgmt=(Number(p.managementFee)||0)+(Number(p.repairFund)||0);
  const deleg=Number(p.delegationFee)||0;
  const interest=Number(p.monthlyInterest)||0;
  const fireIns=Number(p.fireInsurance)||0;
  const propTaxMonthly=Math.round((Number(p.propertyTax)||0)/12);
  const loanPay=Number(p.loanPayment)||0;
  const taxRate=(Number(p.taxRate)||30)/100;
  const annualDepr=Number(p.depreciation)||0;
  const loanYears=Number(p.loanRemainingYears)||0;

  // 節税効果（経費として計上できるものの試算）
  const taxIncome=rent-mgmt-deleg-interest-fireIns-propTaxMonthly;
  const taxAnnual=taxIncome*12;
  const taxBurden=taxAnnual>0?Math.round(taxAnnual*taxRate):0;
  const deprSaving=annualDepr>0?Math.round(annualDepr*taxRate):0;

  // キャッシュフロー（実際の現金出入り）
  const cfMonthly=rent-mgmt-deleg-loanPay-fireIns-propTaxMonthly;
  const cfAnnual=cfMonthly*12;

  // まとめ
  const annualCashOut=cfAnnual;
  const netFinancialImpact=cfAnnual+deprSaving;

  // 補足
  const postLoanMonthly=rent-mgmt-deleg;
  const loanBalanceYen=(Number(p.loanBalance)||0)*10000;

  const TRow=({lbl,v,bold,color,bg})=>(
    <tr style={{borderBottom:"1px solid #f5f5f5",background:bg||"transparent"}}>
      <td style={{padding:"6px 10px",fontSize:12,color:"#555"}}>{lbl}</td>
      <td style={{padding:"6px 10px",fontSize:12,fontWeight:bold?"bold":"normal",color:color||"#333",textAlign:"right"}}>{v}</td>
    </tr>
  );

  return(
    <div style={{...S.card(),marginBottom:14}} className="print-avoid shadow-card print-break">
      <div style={{fontWeight:"bold",fontSize:14,color:NAVY,marginBottom:6}}>💡 節税効果・キャッシュフロー詳細（4P）</div>
      <div style={{fontSize:12,color:"#555",marginBottom:14,padding:"8px 12px",background:"#f8f0ff",borderRadius:6,lineHeight:1.8,border:"1px solid #e9d5ff"}}>
        ①ワンルームマンション投資は収支がマイナスな場合は「節税」にはなるが、キャッシュフローの改善にはならない。<br/>
        ②収支がプラスとなっている場合も、不動産投資で出た収益をプラスした課税所得の圧縮にはなるが、そもそもの年収額の圧縮にはならないことがほとんど。
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        {/* 節税効果 */}
        <div>
          <div style={{fontWeight:"bold",fontSize:13,color:NAVY2,marginBottom:8,paddingBottom:4,borderBottom:`2px solid ${NAVY2}`}}>節税効果（収入と経費として計上できるものの試算）</div>
          <table style={{width:"100%",borderCollapse:"collapse"}}><tbody>
            <TRow lbl="賃料" v={fmtY(rent)}/>
            <TRow lbl="管理費・修繕積立金等" v={mgmt>0?`▲${fmtY(mgmt)}`:"−"} color={RED}/>
            {deleg>0&&<TRow lbl="業務委託費用" v={`▲${fmtY(deleg)}`} color={RED}/>}
            <TRow lbl="利子（月額）" v={interest>0?`▲${fmtY(interest)}`:"※資料より抜粋"} color={RED}/>
            <TRow lbl="火災保険料" v={fireIns>0?`▲${fmtY(fireIns)}`:"0円（複数年契約）"} color={fireIns>0?RED:"#888"}/>
            <TRow lbl={`固定資産税（1/12 / 年${(Number(p.propertyTax)||0).toLocaleString()}円）`} v={`▲${fmtY(propTaxMonthly)}`} color={RED}/>
            <TRow lbl="合計額（不動産所得/月）" v={`${taxIncome>=0?"+":""}${fmtY(taxIncome)}`} bold color={taxIncome>=0?RED:GREEN} bg={taxIncome>=0?"#fff0f0":"#f0fff4"}/>
            <TRow lbl="⇒ 年間不動産所得" v={`${taxAnnual>=0?"+":""}${fmtY(taxAnnual)}`} bold color={taxAnnual>=0?RED:GREEN}/>
            {taxIncome>=0
              ?<TRow lbl={`所得税・住民税（${p.taxRate||30}%）`} v={`年間 ▲${fmtY(taxBurden)}`} bold color={RED}/>
              :<TRow lbl={`節税額（${p.taxRate||30}%）`} v={`年間 +${fmtY(-taxBurden)}`} bold color={GREEN}/>
            }
            {annualDepr>0&&(
              <TRow lbl={`減価償却費（年間${fmtY(annualDepr)}）→ 節税`} v={`年間 +${fmtY(deprSaving)}`} bold color={GREEN} bg="#f0fff4"/>
            )}
          </tbody></table>
        </div>
        {/* キャッシュフロー */}
        <div>
          <div style={{fontWeight:"bold",fontSize:13,color:NAVY2,marginBottom:8,paddingBottom:4,borderBottom:`2px solid ${NAVY2}`}}>キャッシュフロー（手元に入ってくる「増える」現金と、手元から出ていく「減っていく」現金）</div>
          <table style={{width:"100%",borderCollapse:"collapse"}}><tbody>
            <TRow lbl="賃料" v={fmtY(rent)}/>
            <TRow lbl="管理費・修繕積立金等" v={mgmt>0?`▲${fmtY(mgmt)}`:"−"} color={RED}/>
            {deleg>0&&<TRow lbl="業務委託費用" v={`▲${fmtY(deleg)}`} color={RED}/>}
            <TRow lbl="ローン返済" v={loanPay>0?`▲${fmtY(loanPay)}`:"0円（完済）"} color={loanPay>0?RED:"#888"}/>
            <TRow lbl="火災保険料" v={fireIns>0?`▲${fmtY(fireIns)}`:"0円"} color={fireIns>0?RED:"#888"}/>
            <TRow lbl={`固定資産税（1/12）`} v={`▲${fmtY(propTaxMonthly)}`} color={RED}/>
            <TRow lbl="合計額（月間CF）" v={`${cfMonthly>=0?"+":""}${fmtY(cfMonthly)}`} bold color={cfMonthly>=0?GREEN:RED} bg={cfMonthly>=0?"#f0fff4":"#fff0f0"}/>
            <TRow lbl="⇒ 年間" v={`${cfAnnual>=0?"+":""}${fmtY(cfAnnual)}`} bold color={cfMonthly>=0?GREEN:RED}/>
          </tbody></table>
        </div>
      </div>

      {/* まとめ */}
      <div style={{padding:14,background:cfMonthly<0?"#fff8e1":"#f0fff4",borderRadius:8,border:`1px solid ${cfMonthly<0?"#ffe082":GREEN+"44"}`,marginBottom:14}}>
        <div style={{fontWeight:"bold",fontSize:13,color:NAVY,marginBottom:10}}>まとめ ※試算</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>
          <div style={{textAlign:"center",padding:"10px 8px",background:"#fff",borderRadius:8,border:"1px solid #e0e0e0"}}>
            <div style={{fontSize:10,color:"#888",marginBottom:4}}>所得税・住民税率（仮定）</div>
            <div style={{fontSize:18,fontWeight:"bold",color:NAVY}}>{p.taxRate||30}%</div>
          </div>
          <div style={{textAlign:"center",padding:"10px 8px",background:"#fff",borderRadius:8,border:"1px solid #e0e0e0"}}>
            <div style={{fontSize:10,color:"#888",marginBottom:4}}>年間キャッシュアウト</div>
            <div style={{fontSize:16,fontWeight:"bold",color:cfAnnual<0?RED:GREEN}}>{cfAnnual>=0?"+":""}{fmtY(cfAnnual)}</div>
            <div style={{fontSize:10,color:"#888"}}>（{fmtY(cfMonthly)}/月）</div>
          </div>
          <div style={{textAlign:"center",padding:"10px 8px",background:"#fff",borderRadius:8,border:"1px solid #e0e0e0"}}>
            <div style={{fontSize:10,color:"#888",marginBottom:4}}>{annualDepr>0?"減価償却による節税額":"節税額/追加課税"}</div>
            <div style={{fontSize:16,fontWeight:"bold",color:GREEN}}>+{fmtY(deprSaving)}</div>
          </div>
        </div>
        <div style={{fontSize:13,color:"#444",lineHeight:2,padding:"8px 12px",background:"rgba(255,255,255,.7)",borderRadius:6}}>
          所得税・住民税が <strong>{p.taxRate||30}%</strong> と仮定した場合、<br/>
          年間 <strong style={{color:cfAnnual<0?RED:GREEN,fontSize:14}}>{fmtY(cfAnnual)}</strong>（キャッシュアウト）の現金を支払って、
          {annualDepr>0&&<><strong style={{color:GREEN,fontSize:14}}> {fmtY(deprSaving)}</strong> の節税ができている為、</>}
          不動産投資によって年間 <strong style={{color:netFinancialImpact<0?RED:GREEN,fontSize:16}}>
            {netFinancialImpact>=0?"+":""}{fmtY(netFinancialImpact)}
          </strong> {netFinancialImpact<0?"のキャッシュアウト":"のプラス"}
        </div>
      </div>

      {/* 補足：不動産所有目的の種類別試算 */}
      <div>
        <div style={{fontWeight:"bold",fontSize:13,color:NAVY,marginBottom:10}}>＜補足（不動産所有目的の種類別試算）＞</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{padding:"12px 14px",background:"#f0f8ff",borderRadius:8,border:`1px solid ${NAVY2}33`}}>
            <div style={{fontWeight:"bold",fontSize:12,color:NAVY2,marginBottom:8}}>①年金代わり</div>
            <div style={{fontSize:12,color:"#333",lineHeight:2}}>
              <span style={{fontSize:14,fontWeight:"bold",color:NAVY}}>{loanYears>0?loanYears.toFixed(1):"−"}</span>年後から
              <span style={{fontSize:16,fontWeight:"bold",color:GREEN}}> {fmtY(postLoanMonthly)}</span> が収入となる。
              <br/><span style={{fontSize:11,color:"#888"}}>※都度の修繕時・空室時などの対応は必要。</span>
            </div>
          </div>
          <div style={{padding:"12px 14px",background:"#f0fff4",borderRadius:8,border:`1px solid ${GREEN}33`}}>
            <div style={{fontWeight:"bold",fontSize:12,color:GREEN,marginBottom:8}}>②保険代わり（団体信用生命保険）</div>
            <div style={{fontSize:12,color:"#333",lineHeight:2}}>
              現時点でもしお亡くなりになった場合、<br/>
              <span style={{fontSize:16,fontWeight:"bold",color:NAVY}}>{loanBalanceYen>0?fmtM(loanBalanceYen):"−"}</span> 程の資産をお身内に残せる。
              {loanBalanceYen>0&&(
                <div style={{fontSize:11,color:"#888",marginTop:4,padding:"4px 8px",background:"rgba(255,255,255,.7)",borderRadius:4}}>
                  ⇒ 30歳男性・30年満了・掛け捨て定期保険の保険料は<br/>
                  保険金額{p.loanBalance}万円で 約2,000〜3,000円/月 程度
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   レポートビュー（メイン）
   ═══════════════════════════════════════════════ */
function ReportView({prop:p,onEdit,onBack,onPrint}){
  const r=p.aiReport;const cf=getCF(p);const yl=getYld(p);
  const annualRent=(Number(p.rent)||0)*12;
  const annualMgmt=((Number(p.managementFee)||0)+(Number(p.repairFund)||0))*12;
  const annualLoan=(Number(p.loanPayment)||0)*12;
  const annualInterest=(Number(p.monthlyInterest)||0)*12;
  const annualTax=Number(p.propertyTax)||0;
  const annualDepr=Number(p.depreciation)||0;
  const taxR=(Number(p.taxRate)||30)/100;
  const realEstate=annualRent-annualMgmt-annualInterest-annualTax-annualDepr;
  const taxBurden=realEstate*taxR;
  const saleScenarios=[{label:"保守的",price:Number(p.salePriceLow)||0,color:"#888"},{label:"相場",price:Number(p.salePrice)||0,color:NAVY2},{label:"チャレンジ",price:Number(p.salePriceHigh)||0,color:GOLD}].filter(s=>s.price>0).map(s=>{const c=(s.price*0.03+60000)*1.1;const res=(Number(p.loanBalance)||0)*10000;const net=s.price-c-(Number(p.notaryFee)||50000)-(Number(p.prepaymentFee)||0)-(Number(p.cancellationFee)||0)-res;return{...s,commission:c,residual:res,net};});
  const TRow=({lbl,v,bold,color})=>(<tr style={{borderBottom:"1px solid #f5f5f5"}}><td style={{padding:"6px 10px",fontSize:12,color:"#555"}}>{lbl}</td><td style={{padding:"6px 10px",fontSize:12,fontWeight:bold?"bold":"normal",color:color||"#333",textAlign:"right"}}>{v}</td></tr>);

  const hasSimData=(Number(p.rent)||0)>0;

  return(
    <div>
      {/* ヘッダー */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}} className="no-print">
        <button onClick={onBack} style={{background:"transparent",border:"1px solid #cdd5e0",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:13}}>← 一覧</button>
        <h2 style={{margin:0,fontSize:17,color:NAVY,fontWeight:"bold",flex:1,minWidth:0}}>{p.name}</h2>
        {r&&<><span style={S.badge(r.cfRating==="◎良好"?GREEN:r.cfRating==="△要注意"?RED:"#e07b00")}>CF：{r.cfRating}</span><span style={S.badge(r.saleRating==="◎今が売り時"?GREEN:r.saleRating==="△今は保有"?RED:GOLD)}>売却：{r.saleRating}</span></>}
        <button onClick={onEdit} style={S.btn(NAVY,{padding:"7px 16px",fontSize:12})}>✏️ 編集</button>
        <button onClick={onPrint} style={S.btn("#607d8b",{padding:"7px 16px",fontSize:12})}>📄 PDF出力</button>
      </div>

      {/* 印刷時タイトル */}
      <div style={{display:"none"}} className="print-only-title">
        <h1 style={{fontSize:16,color:NAVY,borderBottom:`2px solid ${NAVY}`,paddingBottom:6,marginBottom:14}}>{p.name} 不動産投資分析レポート</h1>
      </div>

      <div style={{fontSize:11,color:"#aaa",marginBottom:14}} className="no-print">最終更新：{fmtD(p.updatedAt)} ／ {r?"🤖 AI分析済み":"AI分析未実施"}</div>

      {/* 1. 基本情報 & 財務サマリー */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}} className="print-avoid">
        <div style={S.card()} className="shadow-card">
          <div style={{fontWeight:"bold",fontSize:14,color:NAVY,marginBottom:10}}>🏢 物件基本情報</div>
          <table style={{width:"100%",borderCollapse:"collapse"}}><tbody>
            {[["所在地",p.address],["最寄駅",p.station],["構造・築年月",`${p.structure||"−"} / ${p.builtDate||"−"}`],["専有面積",p.area?`${p.area}㎡`:"−"],["階数",p.floor||"−"],["総戸数",p.totalUnits||"−"],["現況",p.currentStatus||"−"],["管理会社",p.managementCompany||"−"],["サブリース",p.sublease||"なし"]].map(([l,v])=><TRow key={l} lbl={l} v={v||"−"}/>)}
          </tbody></table>
        </div>
        <div style={S.card()} className="shadow-card">
          <div style={{fontWeight:"bold",fontSize:14,color:NAVY,marginBottom:10}}>💹 財務サマリー</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:12}}>
            {[{l:"月間CF",v:`${cf>=0?"+":""}${fmtY(cf)}`,c:cf>=0?GREEN:RED},{l:"月額賃料",v:fmtY(p.rent),c:"#333"},{l:"管理費+修繕",v:fmtY((Number(p.managementFee)||0)+(Number(p.repairFund)||0)),c:"#333"},{l:"ローン返済",v:fmtY(p.loanPayment),c:"#333"},{l:"ローン残債",v:p.loanBalance?(Number(p.loanBalance)*10000).toLocaleString()+"円":"−",c:"#555"},{l:"表面利回り",v:yl?yl.toFixed(2)+"%":"−",c:yl&&yl>=5?GREEN:"#e07b00"}].map(m=>(<div key={m.l} style={{background:"#f8fafc",borderRadius:6,padding:"7px 9px",textAlign:"center"}}><div style={{fontSize:10,color:"#888",marginBottom:2}}>{m.l}</div><div style={{fontSize:13,fontWeight:"bold",color:m.c}}>{m.v}</div></div>))}
          </div>
          {p.askingPrice&&<div style={{padding:"7px 12px",background:"#f0f4ff",borderRadius:6,fontSize:12}}><strong>希望販売価格：</strong>{p.askingPrice}万円</div>}
          {p.delegationFee&&<div style={{padding:"5px 12px",marginTop:6,background:"#f8fafc",borderRadius:6,fontSize:11,color:"#666"}}>業務委託費：{fmtY(p.delegationFee)}/月</div>}
        </div>
      </div>

      {/* 2. AI市場分析 */}
      {r?(<>
        <div style={{...S.card(),marginBottom:14}} className="print-avoid shadow-card"><div style={{fontWeight:"bold",fontSize:14,color:NAVY,marginBottom:10}}>📊 市場分析（AI調査）</div><div style={{fontSize:13,color:"#333",lineHeight:1.8,whiteSpace:"pre-wrap"}}>{r.marketSummary}</div></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          <div style={S.card()} className="shadow-card">
            <div style={{fontWeight:"bold",fontSize:13,color:GREEN,marginBottom:8}}>✅ アピールポイント</div>
            {(r.positivePoints||[]).map((pt,i)=>(<div key={i} style={{fontSize:12,color:"#333",padding:"5px 0",borderBottom:"1px solid #f5f5f5",lineHeight:1.6}}>● {pt}</div>))}
            <div style={{fontWeight:"bold",fontSize:13,color:NAVY2,margin:"12px 0 6px"}}>🚇 駅・エリア（プラス）</div>
            {(r.stationPositive||[]).map((pt,i)=>(<div key={i} style={{fontSize:11,color:"#444",padding:"3px 0",lineHeight:1.5}}>✅ {pt}</div>))}
          </div>
          <div style={S.card()} className="shadow-card">
            <div style={{fontWeight:"bold",fontSize:13,color:RED,marginBottom:8}}>⚠️ 懸念事項</div>
            {(r.negativePoints||[]).map((pt,i)=>(<div key={i} style={{fontSize:12,color:"#333",padding:"5px 0",borderBottom:"1px solid #f5f5f5",lineHeight:1.6}}>▲ {pt}</div>))}
            <div style={{fontWeight:"bold",fontSize:13,color:NAVY2,margin:"12px 0 6px"}}>🚇 駅・エリア（マイナス）</div>
            {(r.stationNegative||[]).map((pt,i)=>(<div key={i} style={{fontSize:11,color:"#666",padding:"3px 0",lineHeight:1.5}}>⚠️ {pt}</div>))}
          </div>
        </div>
        <div style={{...S.card(),marginBottom:14,borderLeft:`4px solid ${NAVY}`}} className="shadow-card">
          <div style={{fontWeight:"bold",fontSize:14,color:NAVY,marginBottom:8}}>📋 総合評価（AI分析）</div>
          <div style={{fontSize:13,color:"#333",lineHeight:1.8,marginBottom:12,whiteSpace:"pre-wrap"}}>{r.overallJudgment}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div style={{padding:"10px 12px",background:"#f0fff4",borderRadius:6,borderLeft:`3px solid ${GREEN}`}}><div style={{fontSize:11,fontWeight:"bold",color:GREEN,marginBottom:4}}>保有継続の場合</div><div style={{fontSize:12,color:"#333",lineHeight:1.6}}>{r.holdAdvice}</div></div>
            <div style={{padding:"10px 12px",background:"#fff8f0",borderRadius:6,borderLeft:`3px solid ${GOLD}`}}><div style={{fontSize:11,fontWeight:"bold",color:GOLD,marginBottom:4}}>売却を検討する場合</div><div style={{fontSize:12,color:"#333",lineHeight:1.6}}>{r.saleAdvice}</div></div>
          </div>
        </div>
      </>):(<div style={{...S.card(),marginBottom:14,textAlign:"center",padding:40}} className="no-print"><div style={{fontSize:32,marginBottom:12}}>🤖</div><div style={{fontSize:15,color:"#555",marginBottom:8}}>AI分析レポートが未生成です</div><div style={{fontSize:12,color:"#888",marginBottom:16}}>物件情報を入力してAIレポートを生成すると詳細な分析が表示されます</div><button onClick={onEdit} style={S.btn(NAVY)}>✏️ 編集してAIレポートを生成</button></div>)}

      {/* 3. 収支シミュレーション（PDF 3P相当） */}
      {hasSimData&&<SimSection p={p}/>}

      {/* 4. 節税効果・CF詳細（PDF 4P相当） */}
      {hasSimData&&<TaxCFSection p={p}/>}

      {/* 5. 賃料推移シミュレーション */}
      {p.rentPeriods?.some(v=>v)&&(<div style={{...S.card(),marginBottom:14}} className="print-avoid shadow-card"><div style={{fontWeight:"bold",fontSize:14,color:NAVY,marginBottom:10}}>📉 賃料推移シミュレーション</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{["1〜5年目","6〜10年目","11〜15年目","16〜20年目","21〜25年目","26〜30年目"].map((lbl,i)=>{const v=p.rentPeriods[i];const base=Number(p.rent)||1;const pct=v?((Number(v)-base)/base*100).toFixed(1):null;return(<div key={i} style={{flex:"1 1 90px",background:"#f8fafc",borderRadius:6,padding:"8px 10px",textAlign:"center"}}><div style={{fontSize:10,color:"#888",marginBottom:2}}>{lbl}</div><div style={{fontSize:13,fontWeight:"bold",color:NAVY}}>{v?fmtY(v):"−"}</div>{pct&&i>0&&<div style={{fontSize:11,color:Number(pct)>=0?GREEN:RED}}>{Number(pct)>0?"+":""}{pct}%</div>}</div>);})}</div></div>)}

      {/* 6. 売却シナリオ試算 */}
      {saleScenarios.length>0&&(<div style={{...S.card(),marginBottom:14}} className="print-avoid shadow-card"><div style={{fontWeight:"bold",fontSize:14,color:NAVY,marginBottom:10}}>🏷️ 売却シナリオ試算</div><div style={{display:"grid",gridTemplateColumns:`repeat(${saleScenarios.length},1fr)`,gap:10}}>{saleScenarios.map((s,i)=>(<div key={i} style={{border:`2px solid ${s.color}20`,borderTop:`3px solid ${s.color}`,borderRadius:8,padding:12,background:`${s.color}08`}}><div style={{fontSize:12,fontWeight:"bold",color:s.color,marginBottom:6}}>{s.label}シナリオ</div><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><tbody>{[["売却価格",fmtM(s.price)],["仲介手数料",`▲${fmtM(s.commission)}`],["ローン返済",`▲${fmtM(s.residual)}`]].map(([l,v])=>(<tr key={l}><td style={{padding:"3px 0",color:"#666"}}>{l}</td><td style={{textAlign:"right"}}>{v}</td></tr>))}<tr style={{borderTop:`1px solid ${s.color}40`}}><td style={{padding:"5px 0",fontWeight:"bold"}}>手残り</td><td style={{textAlign:"right",fontWeight:"bold",color:s.net>=0?GREEN:RED,fontSize:14}}>{s.net>=0?"+":""}{fmtM(s.net)}</td></tr></tbody></table></div>))}</div></div>)}

      {/* 7. 備考 */}
      {p.notes&&(<div style={{...S.card(),marginBottom:14}} className="print-avoid shadow-card"><div style={{fontWeight:"bold",fontSize:13,color:NAVY,marginBottom:6}}>📝 備考・メモ</div><div style={{fontSize:12,color:"#444",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{p.notes}</div></div>)}

      <div style={{fontSize:10,color:"#ccc",textAlign:"right",marginTop:4}}>本ツールの計算結果はあくまで参考値です。実際の投資判断は専門家にご相談ください。</div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
